<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
         background: #0d1117; color: #c9d1d9; line-height: 1.6; padding: 20px; }
  .container { max-width: 900px; margin: 0 auto; }
  h1 { color: #58a6ff; margin-bottom: 8px; font-size: 1.8em; }
  .subtitle { color: #8b949e; margin-bottom: 30px; }
  .repo { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
          padding: 20px; margin-bottom: 16px; }
  .repo:hover { border-color: #58a6ff; }
  .repo-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .rank { background: #238636; color: #fff; width: 28px; height: 28px;
          border-radius: 50%; display: flex; align-items: center; justify-content: center;
          font-weight: bold; font-size: 14px; flex-shrink: 0; }
  .rank.top { background: #da3633; }
  .repo-name { font-size: 1.2em; font-weight: 600; }
  .repo-name a { color: #58a6ff; text-decoration: none; }
  .repo-name a:hover { text-decoration: underline; }
  .repo-desc { color: #8b949e; margin-left: 40px; margin-bottom: 8px; font-size: 0.95em; }
  .repo-brief { color: #7ee787; margin-left: 40px; margin-bottom: 10px;
                 font-size: 0.9em; font-style: italic; }
  .repo-meta { display: flex; gap: 16px; margin-left: 40px; flex-wrap: wrap; }
  .meta-item { color: #8b949e; font-size: 0.85em; display: flex; align-items: center; gap: 4px; }
  .meta-item .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
  .stars { color: #f0883e; font-weight: 600; }
  .footer { text-align: center; color: #484f58; margin-top: 40px; padding: 20px;
             border-top: 1px solid #21262d; }
</style>
</head>
<body>
<div class="container">
<h1>{{ICON}} {{TITLE}}</h1>
<p class="subtitle">{{DATE}} · {{SUBTITLE}}</p>
<div class="repo-list">
{{REPOS}}
</div>
<div class="footer">
  <p>Generated on {{DATE}}</p>
</div>
</div>
</body>
</html>
